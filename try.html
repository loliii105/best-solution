<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Solution – IS Company</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #002d72;
      --gold: #d4af37;
      --bg: #f4f7f6;
      --text: #333;
      --footer-bg: #0b1c38;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); }
    body[dir="rtl"] { text-align: right; }
    
    /* حل مشكلة الروابط واختفاء القسم خلف الهيدر */
    section { scroll-margin-top: 80px; padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }

    header {
      position: fixed; top: 0; width: 100%; height: 70px;
      background: var(--primary); color: #fff;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 2rem; z-index: 1000;
    }

    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-links a { color: #fff; font-weight: bold; cursor: pointer; }

    .hero { height: 80vh; background: #ddd; display: flex; align-items: center; justify-content: center; margin-top: 70px; }

    footer { background: var(--footer-bg); color: #fff; padding: 3rem 2rem; }
    .footer-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; max-width: 1200px; margin: 0 auto; }
    .footer-col h4 { color: var(--gold); margin-bottom: 15px; border-bottom: 2px solid var(--gold); display: inline-block; }
    .footer-col ul li { margin-bottom: 10px; }
    .footer-col a:hover { color: var(--gold); }
    .footer-col i { color: var(--gold); margin: 0 5px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Best Solution</div>
    <ul class="nav-links">
      <li><a href="#service">الخدمات</a></li>
      <li><a href="#about">من نحن</a></li>
      <li><a href="#contact">اتصل بنا</a></li>
      <li><a onclick="toggleLang()" style="cursor:pointer; color:var(--gold);">EN/AR</a></li>
    </ul>
  </header>

  <div class="hero"><h1>مرحباً بكم في Best Solution</h1></div>

  <section id="service">
    <h2>خدماتنا</h2>
    <p>هنا ستظهر تفاصيل الخدمات الخاصة بالشركة.</p>
  </section>

  <section id="about">
    <h2>من نحن</h2>
    <p>معلومات عن الشركة ورؤيتها.</p>
  </section>

  <section id="contact">
    <h2>اتصل بنا</h2>
    <p>بيانات التواصل.</p>
  </section>

  <footer>
    <div class="footer-content">
      <div class="footer-col">
        <h4>روابط سريعة</h4>
        <ul>
          <li><a href="#service"><i class="fas fa-angle-left"></i> الخدمات</a></li>
          <li><a href="#about"><i class="fas fa-angle-left"></i> من نحن</a></li>
          <li><a href="#contact"><i class="fas fa-angle-left"></i> اتصل بنا</a></li>
        </ul>
      </div>
      <div class="footer-col">
        <h4>تابعنا</h4>
        <ul style="display:flex; gap:15px;">
          <li><a href="#"><i class="fab fa-facebook-f"></i></a></li>
          <li><a href="#"><i class="fab fa-twitter"></i></a></li>
          <li><a href="#"><i class="fab fa-linkedin-in"></i></a></li>
        </ul>
      </div>
    </div>
  </footer>

  <script>
    function toggleLang() {
      const body = document.body;
      body.dir = (body.dir === "rtl") ? "ltr" : "rtl";
    }
  </script>
</body>
</html>
